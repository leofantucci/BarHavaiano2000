{% extends 'base.html' %}
{% block title %}Login — Xhampolhos Bar{% endblock %}
{% block body_class %}login-page{% endblock %}
{% block content %}
<div class="login-bg-glow"></div>
<div class="login-card">
    <div class="login-logo">
        <i class="fas fa-glass-martini-alt"></i>
    </div>
    <h1>Bem-vindo</h1>
    <p class="subtitle">Faça login para continuar</p>

    <form method="post">
        {% csrf_token %}
        <p>
            <label>Usuário</label>
            <input type="text" name="username" placeholder="Seu usuário">
        </p>
        <p>
            <label>Senha</label>
            <input type="password" name="password" placeholder="Sua senha">
        </p>
        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="login-footer">
        <a href="{% url 'usuarios:register' 'cliente' %}">Cadastrar Cliente</a>
        <span style="margin:0 8px;color:var(--text-muted);">·</span>
        <a href="{% url 'usuarios:register' 'funcionario' %}">Cadastrar Funcionário</a>
    </div>
</div>
{% endblock %}
